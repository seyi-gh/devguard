services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devguard
      POSTGRES_USER: devguard
      POSTGRES_PASSWORD: devguard
    ports: ['5432:5432']
    volumes: ['postgres_data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devguard -d devguard']
      interval: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes: ['redis_data:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ['8000:8000']
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /tmp/devguard:/tmp/devguard
  
  frontend:
    build: ./frontend
    command: npm run dev
    ports: ['3000:3000']
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  redis_data: